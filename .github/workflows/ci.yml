name: CI/CD - Reboque Inteligente

on:
  push:
    branches: [main]
    paths:
      - "auto-attendance/**"
  pull_request:
    branches: [main]
    paths:
      - "auto-attendance/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-attendance

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: reboque_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: auto-attendance/package-lock.json

      - run: npm ci

      - name: Check syntax
        run: node --check server.js

      - name: Check agents syntax
        run: |
          node --check agents/attendant.js
          node --check agents/conversationFlow.js
          node --check agents/orchestrator.js
          node --check agents/dispatcher.js
          node --check agents/analyst.js

      - name: Check services syntax
        run: |
          node --check services/payment.js
          node --check services/notifications.js

      - name: Run database migration
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: reboque_test
          PG_USER: postgres
          PG_PASSWORD: postgres
        run: node database/migrate.js || echo "Migration skipped (no SQLite source)"

  build-web-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-attendance/web-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: auto-attendance/web-client/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-client-dist
          path: auto-attendance/web-client/dist/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-web-client]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t reboque-inteligente:latest ./auto-attendance

      - name: Test Docker image
        run: |
          docker run -d --name test-app -p 3003:3003 reboque-inteligente:latest
          sleep 5
          curl -f http://localhost:3003/api/settings || exit 1
          docker stop test-app
          docker rm test-app
