# Incluir no bloco server { ... } HTTPS do site (ex.: calicream.club).
# location / { include já aplicará estes add_header; use "always" para respostas de erro também.
#
# Ajuste a diretiva connect-src se a API estiver noutro host (ex.: https://api.exemplo.com).

add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# Mínimo ~6 meses (15768000s) para testes tipo Mozilla Observatory; subir depois se quiseres.
add_header Strict-Transport-Security "max-age=15768000" always;


# style-src sem 'unsafe-inline' (CSS vem do bundle + stylesheet fonts.googleapis.com)
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; upgrade-insecure-requests;" always;
